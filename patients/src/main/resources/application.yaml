spring:
  application:
    name: patients

  cloud:
    config:
      enabled: false
    consul:
      host: localhost
      port: 8500
      discovery:
        hostname: patients
        health-check-url: http://patients:8080/actuator/health
        health-check-interval: 10s

  datasource:
    url: jdbc:mysql://localhost:3308/healthcare
    username: admin_healthcare
    password: healthadmin123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health