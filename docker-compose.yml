services:
#TODO réfactorer docker compose, app yml et docker file
  #TODO faire fonctionner mon ms sur consul
  #TODO configurer config server + héritage
  #TODO finir l'api restful pour CRUD user et patient
  consul:
    image: kaeldev/consul:latest
    mem_limit: 700m
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    healthcheck:
      test: "curl --fail --silent localhost:8500/v1/status/leader | grep . || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - healthcare-network

#config server ici

  mysql:
    image: mysql:8
    mem_limit: 700m
    container_name: mysql-healthcare_bd
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: healthcare
      MYSQL_USER: admin_healthcare
      MYSQL_PASSWORD: healthadmin123
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthcare-network
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  patients:
    image: kaeldev/patients
    container_name: patients
    mem_limit: 700m
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      consul:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "patients"
      SPRING_DATASOURCE_URL: "jdbc:mysql://localhost:3306/healthcare"
    networks:
      - healthcare-network

volumes:
  mysql_data:

networks:
  healthcare-network:
    driver: "bridge"